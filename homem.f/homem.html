<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Homem de Ferro 3</title>

<style>
    body {
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        
    }

    .container {
        width: 500px;
        height: 300px;
        background: rgb(255, 99, 99);
        border: 6px solid red;
        border-radius: 20px;
        position: relative;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
        background-image: url('tonysterko.jpg');
        background-size: cover;
        background-position: center;
        text-align: center;
        
        
    }

    .titulo {
        text-align: center;
        margin-top: 20px;
        font-size: 28px;
        color: red;
    }



    .quadrado {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        bottom: 10px;
        right: 10px;
        overflow: hidden; 
        border: 2px solid rgb(139, 0, 23);
    }

    .quadrado img {
        width: 100%;
        height: 100%;
        object-fit: cover; 
    }

    .img2{

    display: block;
    margin: 0 auto;
    border: 5px solid rgb(0, 0, 0); 
    border-radius: 10px;

    width: 300px;

    height: 166px;
    display: block;
    margin: 0 auto; 
    border: 5px solid red;
    border-radius: 10px;
    padding: 0%;
    
  
    background-image: url("ironman.jpg"); 
  
    background-size: cover;  
  
    background-position: center;   
  
    background-repeat: no-repeat;
  
    display: flex;

    align-items: center;

    justify-content: center;

    color: rgb(185, 64, 64);

    background-image: 

    linear-gradient(0%);

    display: block;
    margin: 0 auto;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-top: 42px;
 
  
    }
</style>
</head>

<body>

<div class="container" > 
    
    <div class="img2"><img src="homem.jpg" alt=""></div>

    <div class="titulo">Homem de Ferro 3</div>

  

    <div class="quadrado" ></div>

    <div class="quadrado img" > <img src="02homem.jpg" alt=""></div>

</div>

</body>
</html>
